app.jwt.secret=${JWT_SECRET}
# Access token TTL — shortened from 24h now that refresh tokens (feature #10)
# exist to silently renew it. 2h = 7200000 ms. Override via env if needed.
app.jwt.expiration=${JWT_ACCESS_EXPIRATION:7200000}
# Refresh token TTL — 30 days = 2592000000 ms. Long-lived, single-use, rotated
# on every POST /api/v1/auth/refresh call (see MobileRefreshTokenService).
app.jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:2592000000}
# How many days a revoked/expired refresh-token row is kept before the cleanup
# job purges it — gives a window to investigate before the data is gone.
app.mobile.refreshToken.cleanupGraceDays=${MOBILE_REFRESH_CLEANUP_GRACE_DAYS:7}
# Cron for the automatic daily cleanup job (default 2:15 AM server time).
app.mobile.refreshToken.cleanupCron=${MOBILE_REFRESH_CLEANUP_CRON:0 15 2 * * *}

# SERVER
server.port=${SERVER_PORT:9090}
server.servlet.context-path=${SERVER_CONTEXT_PATH:/sms}
server.servlet.session.timeout=${SERVER_SESSION_TIMEOUT:60m}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.error.include-message=always
server.error.include-binding-errors=always
server.forward-headers-strategy=native

# APP
spring.application.name=sms
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# DATABASE (env override; default is localhost for dev)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smsweb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#mail configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=akccoding@gmail.com
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Hikari pool
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=false

# Logging
logging.level.root=INFO
logging.level.com.smsweb.sms=DEBUG
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LOG:TRACE}

# Thymeleaf & static
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.resolve-lazily=false
spring.servlet.multipart.location=${java.io.tmpdir}

# ---------------------------------------------------------------------------
# File storage — all paths live under /app/data inside the container.
# Mount ONE volume in docker-compose:  C:/SMSAPP/data:/app/data
# The container auto-creates sub-folders on first use.
#
# Direct IntelliJ run (no Docker): override each var in Run Configuration,
#   e.g. STUDENT_IMAGE_PATH=C:/SMSAPP/data/images/students
# ---------------------------------------------------------------------------
student.image.storage.path=${STUDENT_IMAGE_PATH:/app/data/images/students}
employee.image.storage.path=${EMPLOYEE_IMAGE_PATH:/app/data/images/employees}
school.image.storage.path=${SCHOOL_IMAGE_PATH:/app/data/images/schools}
customer.image.storage.path=${CUSTOMER_IMAGE_PATH:/app/data/images/customers}
app.download.docs.path=${DOWNLOAD_DOCS_PATH:/app/data/download_docs}

# JSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.serialization.fail-on-empty-beans=false
