# SERVER
server.port=${SERVER_PORT:9090}
server.servlet.context-path=${SERVER_CONTEXT_PATH:/sms}
server.servlet.session.timeout=${SERVER_SESSION_TIMEOUT:60m}
server.error.include-message=always
server.error.include-binding-errors=always

# APP
spring.application.name=sms
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# DATABASE (env override; default is localhost for dev)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smsweb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:anoop}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#mail configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Hikari pool
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=false

# Logging
logging.level.root=INFO
logging.level.com.smsweb.sms=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Thymeleaf & static
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.resolve-lazily=false
spring.servlet.multipart.location=${java.io.tmpdir}

# File storage paths - configurable via env vars or will use Windows defaults during dev
#student.image.storage.path=${STUDENT_IMAGE_PATH:C:/Softwares/SMSAPP_IMG/images/students}
#employee.image.storage.path=${EMPLOYEE_IMAGE_PATH:C:/Softwares/SMSAPP_IMG/images/employees}
#school.image.storage.path=${SCHOOL_IMAGE_PATH:C:/Softwares/SMSAPP_IMG/images/schools}
student.image.storage.path=${STUDENT_IMAGE_PATH:/data/images/students}
employee.image.storage.path=${EMPLOYEE_IMAGE_PATH:/data/images/employees}
school.image.storage.path=${SCHOOL_IMAGE_PATH:/data/images/schools}
customer.image.storage.path=${CUSTOMER_IMAGE_PATH:/data/images/customer}

# JSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.serialization.fail-on-empty-beans=false
