<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>UAIC - Student</title>
</head>
<body>
<section>
    <div class="container-fluid px-3">
        <div class="row mt-2">
            <div class="col-md-12">
                <div class="card-header fs-3">Sibling Group Form</div>
                <hr/>
                <!--Search box-->
                <div class="search-container my-3">
                    <!--<input  type="text" class="form-control" id="search-input" placeholder="Search student name">-->
                    <input type="text" onkeyup="searchStuName()" class="form-control" id="search-input" placeholder="Search student name">
                    <div class="search-result" style="max-height:300px; overflow-y:auto; border:1px solid #dee2e6; border-radius:4px; display:none;">
                    </div>
                </div>
                <!--Add Individual Student-->
                <h4>Add Manually, if not sure</h4>
                <hr/>
                <div class="row search-container1 my-3">
                    <div class="col-md-6 search-block">
                        <label for="search-input1" class="form-label">Student Name</label>
                        <input type="text" onkeyup="searchStuNameIndividual()" class="form-control" id="search-input1" placeholder="Search student name" name="stuname">
                        <div class="search-result1" style="max-height:300px; overflow-y:auto; border:1px solid #dee2e6; border-radius:4px; display:none;">
                        </div>
                    </div>
                    <div class="col-md-1">
                        <input type="hidden" id="academic_student" name="academic_student" />
                        <input type="hidden" id="student_id_global" />
                    </div>
                    <div class="col-md-5 align-self-end mb-2">
                        <label class="form-label">&nbsp;</label>
                        <div class="col-sm-4">
                            <button onclick="checkStudentData()" class="btn btn-primary" id="siblingAddBtn"><i class="bi bi-person-plus-fill"></i> Add Student</button>
                        </div>
                    </div>
                </div>
                <div class="group-data" style="display: none">
                    <div class="card-header fs-3">Create Group</div>
                    <hr/>
                    <form name="siblinggroup" th:action="@{/sibling/savesiblinggroup}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label for="groupname" class="form-label">Group Name</label>
                                <input type="text" class="form-control" name="groupname" id="groupname">
                            </div>
                            <div class="col-md-6 mb-2">
                            </div>
                            <div class="col-md-12 mb-2">
                                <h6><b>Sibling List</b></h6>
                                <table class="table table-bordered table-striped table-sm" id="siblingTable">
                                    <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Student Name</th>
                                        <th>Father Name</th>
                                        <th>Mother Name</th>
                                        <th>Grade</th>
                                        <th>Branch</th>
                                        <th>Action</th>
                                    </tr>
                                    </thead>
                                    <tbody class="table-group-divider">

                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-5">
                                <a class="btn btn-info" th:href="@{/sibling/sibling-group}"><i class="bi bi-arrow-left-circle-fill"></i> Back to List</a>
                            </div>
                            <div class="col-md-6 mb-5">
                                <button type="button" onclick="checkData()" class="btn btn-primary" id="siblingSubmitBtn"><i class="bi bi-save2-fill"></i> Save</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
    <script th:src="@{/js/toastr.min.js}"></script>
    <script th:inline="javascript">
        const contextPath = /*[[@{/}]]*/ '/';
    </script>
    <script type="text/javascript" th:inline="javascript">
        const successMessage = [[${success}]];
        if (successMessage) {
            showMsg("success", successMessage, "Success");
        }

        const infoMessage = [[${info}]];
        if (infoMessage) {
            showMsg("info", infoMessage, "Info");
        }

        const errorMessage = [[${error}]];
        if (errorMessage) {
            showMsg("error", errorMessage, "Error");
        }

        function showMsg(msgType, msg, headerValue){
            toastr.options = {
                "closeButton": true,
                "debug": false,
                "newestOnTop": false,
                "progressBar": false,
                "positionClass": "toast-top-right",
                "preventDuplicates": false,
                "onclick": null,
                "showDuration": "600",
                "hideDuration": "1000",
                "timeOut": "5000",
                "extendedTimeOut": "1000",
                "showEasing": "swing",
                "hideEasing": "linear",
                "showMethod": "fadeIn",
                "hideMethod": "fadeOut"
            }
            toastr[msgType](msg,headerValue);
        }

        /* ── Search box 1 (group search via searchStudentForOtherPage) ── */
        let _sb1Query = '', _sb1Page = 0, _sb1More = false, _sb1Loading = false;
        const _sb1Row = (s) => {
            let sr = s.classSrNo ? ' / ' + s.classSrNo : ' / -';
            return `<a onclick="loadStudentData(${s.id})" href="#" class='list-group-item list-group-item-action'>${s.student.studentName} / ${s.student.fatherName} / ${s.grade.gradeName}-${s.section.sectionName}${sr}</a>`;
        };
        const _sb1Fetch = (query, page, append) => {
            if (_sb1Loading) return;
            _sb1Loading = true;
            fetch(`${contextPath}searchStudentForOtherPage/${encodeURIComponent(query)}?page=${page}`)
                .then(r => r.json()).then(data => {
                    _sb1Loading = false;
                    _sb1More = data.length === 10;
                    if (!append) {
                        let html = `<div class='list-group' id='sb1-list-group'>`;
                        data.forEach(s => { html += _sb1Row(s); });
                        $(".search-result").html(html + `</div>`).show();
                    } else {
                        data.forEach(s => { $('#sb1-list-group').append(_sb1Row(s)); });
                    }
                }).catch(() => { _sb1Loading = false; });
        };
        const searchStuName = () => {
            let query = $("#search-input").val();
            if (query.trim().length > 2) {
                if (query !== _sb1Query) { _sb1Query = query; _sb1Page = 0; _sb1Fetch(query, 0, false); }
            } else { _sb1Query = ''; $(".search-result").hide(); }
        };
        document.querySelector('.search-result').addEventListener('scroll', function() {
            if (!_sb1More || _sb1Loading) return;
            if (this.scrollTop + this.clientHeight >= this.scrollHeight - 40) { _sb1Page++; _sb1Fetch(_sb1Query, _sb1Page, true); }
        });

        /* ── Search box 2 (individual — GLOBAL search: all active students, all branches) ── */
        let _sb2Query = '', _sb2Page = 0, _sb2More = false, _sb2Loading = false;
        // Cache stores full lean-map objects keyed by academicStudent.id
        // so we can build the table row without a second API call
        const _sb2Cache = {};

        const _sb2Row = (s) => {
            let sr = s.classSrNo ? ' / ' + s.classSrNo : ' / -';
            let school = s.school ? ' [' + s.school.schoolName + ']' : '';
            return `<a onclick="loadStudentData1(${s.id})" href="#" class='list-group-item list-group-item-action'>${s.student.studentName} / ${s.student.fatherName} / ${s.grade.gradeName}-${s.section.sectionName}${sr}${school}</a>`;
        };
        const _sb2Fetch = (query, page, append) => {
            if (_sb2Loading) return;
            _sb2Loading = true;
            // Global endpoint — searches ALL active students regardless of school/year
            fetch(`${contextPath}searchStudentForSiblingPage/${encodeURIComponent(query)}?page=${page}`)
                .then(r => r.json()).then(data => {
                    _sb2Loading = false;
                    _sb2More = data.length === 10;
                    // Cache each result by academicStudent.id
                    data.forEach(s => { _sb2Cache[s.id] = s; });
                    if (!append) {
                        let html = `<div class='list-group' id='sb2-list-group'>`;
                        data.forEach(s => { html += _sb2Row(s); });
                        $(".search-result1").html(html + `</div>`).show();
                    } else {
                        data.forEach(s => { $('#sb2-list-group').append(_sb2Row(s)); });
                    }
                }).catch(() => { _sb2Loading = false; });
        };
        const searchStuNameIndividual = () => {
            let query = $("#search-input1").val();
            if (query.trim().length > 2) {
                if (query !== _sb2Query) { _sb2Query = query; _sb2Page = 0; _sb2Fetch(query, 0, false); }
            } else { _sb2Query = ''; $(".search-result1").hide(); }
        };
        document.querySelector('.search-result1').addEventListener('scroll', function() {
            if (!_sb2More || _sb2Loading) return;
            if (this.scrollTop + this.clientHeight >= this.scrollHeight - 40) { _sb2Page++; _sb2Fetch(_sb2Query, _sb2Page, true); }
        });

        /* ── Shared: build a table row with remove button ── */
        const buildSiblingRow = (idx, value) => {
            return `<tr>
                <td>${idx}<input type="hidden" name="academicstudent" value="${value.id}" /></td>
                <td>${value.student.studentName}</td>
                <td>${value.student.fatherName}</td>
                <td>${value.student.motherName}</td>
                <td>${value.grade.gradeName} - ${value.section.sectionName}</td>
                <td>${value.school.schoolName}</td>
                <td><button type="button" class="btn btn-danger btn-sm remove-sibling-row"><i class="bi bi-trash"></i></button></td>
            </tr>`;
        };

        /* ── Renumber all rows after a removal ── */
        const renumberSiblingRows = () => {
            $('#siblingTable tbody tr').each(function(index) {
                const td = $(this).find('td').first();
                const hidden = td.find('input[type=hidden]');
                td.text(index + 1);
                td.append(hidden);
            });
        };

        /* ── Remove row click handler (delegated) ── */
        $('#siblingTable').on('click', '.remove-sibling-row', function() {
            $(this).closest('tr').remove();
            renumberSiblingRows();
            if ($('#siblingTable tbody tr').length === 0) {
                $('.group-data').hide();
            }
        });

        const loadStudentData=(id)=>{
            $(".search-result").hide();
            $("#search-input").val('');
            $('.group-data').hide();
            if(id>0){
                let url = `${contextPath}getStudentDetailsForSibling/${id}`;
                fetch(url).then(response => {
                    return response.json();
                }).then((data) => {
                    if('noSibling' in data){
                        showMsg("warning",data.noSibling,"Message");
                    } else{
                        // FIX 2: clear table before loading new search result
                        $('#siblingTable > tbody').empty();
                        $('.group-data').show();
                        let siblings = data.siblingList;
                        for (let i = 0; i < siblings.length; i++) {
                            $('#siblingTable > tbody').append(buildSiblingRow(i + 1, siblings[i]));
                        }
                    }
                }).catch(error => {
                    console.error('Error:', error);
                    showMsg("error", error, "Error");
                });
            }
        }

        // Stores the full lean-map of the student selected in search box 2
        let _selectedSiblingStudent = null;

        const loadStudentData1=(acStuId)=>{
            $(".search-result1").hide();
            if(acStuId > 0){
                const cached = _sb2Cache[acStuId];
                if(cached){
                    _selectedSiblingStudent = cached;
                    $('#academic_student').val("" + cached.id);
                    $('#student_id_global').val("" + cached.student.id);
                    $("#search-input1").val(cached.student.studentName);
                } else{
                    // Fallback if not in cache (shouldn't happen in normal flow)
                    $('#academic_student').val("" + acStuId);
                    $("#search-input1").val('');
                }
            } else{
                _selectedSiblingStudent = null;
                $('.group-data').hide();
            }
        }

        const checkStudentData = () =>{
            let academic_student_id = $('#academic_student').val();
            let student_id = $('#student_id_global').val();
            if(!academic_student_id || academic_student_id <= 0){
                showMsg("warning","No student selected. Please search and select a student first.","Message");
                return;
            }
            // Layer 1: duplicate check — reject if academicStudent.id already in the table
            const alreadyAdded = $('#siblingTable tbody input[name="academicstudent"]')
                .toArray().some(el => el.value === String(academic_student_id));
            if(alreadyAdded){
                showMsg("warning","This student is already added to the group.","Duplicate");
                return;
            }
            // Layer 2: cross-school eligibility check — prevent duplicate sibling discount
            if(student_id && student_id > 0){
                fetch(`${contextPath}checkSiblingEligibility/${student_id}`)
                    .then(r => r.json())
                    .then(eligibility => {
                        if(eligibility.blocked){
                            showMsg("error",
                                `Cannot add: Student is already in sibling group "<b>${eligibility.groupName}</b>" at ${eligibility.schoolName}. Sibling discount is centralised — one group per family across all branches.`,
                                "Duplicate Discount Blocked");
                            return;
                        }
                        // Eligible — build row from cached data (no extra API call needed)
                        const value = _selectedSiblingStudent;
                        if(!value){
                            showMsg("warning","Student data not found. Please search and select again.","Error");
                            return;
                        }
                        const rowCount = $('#siblingTable tbody tr').length;
                        $('.group-data').show();
                        $('#siblingTable > tbody').append(buildSiblingRow(rowCount + 1, value));
                        $('#academic_student').val('');
                        $('#student_id_global').val('');
                        $("#search-input1").val('');
                        _selectedSiblingStudent = null;
                    }).catch(err => {
                        showMsg("error", "Eligibility check failed. Please try again.", "Error");
                        console.error(err);
                    });
            } else{
                // student_id not available — fallback to old API fetch
                let url = `${contextPath}searchStudentIndividualGlobal/${academic_student_id}`;
                fetch(url).then(r => r.json()).then(data => {
                    if('noAcademicStudent' in data){
                        showMsg("warning", data.noAcademicStudent, "Error");
                    } else{
                        const value = data.academicStudent;
                        const rowCount = $('#siblingTable tbody tr').length;
                        $('.group-data').show();
                        $('#siblingTable > tbody').append(buildSiblingRow(rowCount + 1, value));
                        $('#academic_student').val('');
                        $("#search-input1").val('');
                    }
                }).catch(err => { showMsg("error", err, "Error"); });
            }
        }

        const checkData = ()=>{
            const grpName = $('#groupname').val();
            if(grpName.trim()===''){
                showMsg("error","Please enter a group name.","Message");
                return;
            }
            const rowCount = $('#siblingTable tbody tr').length;
            // FIX 3: explicit 0-row check before the min-3 check
            if(rowCount === 0){
                showMsg("warning","No students added to the group yet.","Message");
                return;
            }
            if(rowCount < 3){
                showMsg("info","At least 3 siblings are required to avail this discount.","Info");
                return;
            }
            document.forms.siblinggroup.submit();
        }

    </script>
</section>
</body>
</html>

</body>
</html>
