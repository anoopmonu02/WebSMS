<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>UAIC - Student</title>
</head>
<body>
<section>
    <div class="container">
        <div class="row mt-2 ">
            <div class="col-md-12">
                <div class="card-header fs-3">Students Eligible For Discount</div>
                <hr/>
                <div>
                    <div class="row mt-3">
                        <div class="col-md-3">
                            <label for="academic_year" class="form-label">Academic Year</label>
                            <select name="academic_year" id="academic_year" class="form-select">
                                <option th:each="med : ${academicYears}" th:value="${med.id}" th:text="${med.sessionFormat}">Academic Year</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            &nbsp;
                        </div>
                        <div class="col-md-3 align-self-end">
                            <div class="col-sm-5">
                                <button name="getfee" id="getfee" class="btn btn-primary"><i class="bi bi-search"></i> Get List </button>
                            </div>
                        </div>
                    </div>

                </div>
                <hr/>
                <div class="row" id="printable-div" style="display: none">
                    <div class="card-header fs-3">Eligible Students List</div><hr/>

                    <div class="row">
                        <div class="student-details" id="student-collection-data">

                        </div>
                    </div>
                </div>



            </div>
        </div>
    </div>

    <script th:src="@{/js/jquery-3.7.1.js}"></script>
    <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
    <script th:src="@{/js/toastr.min.js}"></script>
    <link type="text/css" rel="stylesheet" th:href="@{/css/flatpickr.min.css}"/>
    <script th:src="@{/js/flatpickr.js}"></script>
    <!--<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>-->

    <script type="text/javascript" th:inline="javascript">
        const contextPath = /*[[@{/}]]*/ '/';
        flatpickr("#lastdate", {
            dateFormat: "d/M/Y",  // Equivalent to dd/MMM/yyyy
        });

        function showWarningMsg(msgType, msg, headerValue){
            toastr.options = {
                "closeButton": true,
                "debug": false,
                "newestOnTop": false,
                "progressBar": false,
                "positionClass": "toast-top-right",
                "preventDuplicates": false,
                "onclick": null,
                "showDuration": "600",
                "hideDuration": "1000",
                "timeOut": "5000",
                "extendedTimeOut": "1000",
                "showEasing": "swing",
                "hideEasing": "linear",
                "showMethod": "fadeIn",
                "hideMethod": "fadeOut"
            }
            toastr[msgType](msg,headerValue);
        }

        $('#getfee').click(async function() {
            $("#student-collection-data").empty();
            $("#printable-div").hide();
            let academicYearVal = $("#academic_year").val();

            if(academicYearVal === ''){
                showWarningMsg('error','Academic Year is mandatory',"Warning");
                return;
            }
            let checkBoxes = "";

            let url = `${contextPath}getStudentsDiscountList`;
            try{
                const requestBody = {
                    academicYearId:academicYearVal
                };
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });
                //console.log("response "+response);
                if (!response.ok) {
                    throw new Error('Network response was not ok ' + response.statusText);
                }
                //console.log("-----------------------------")
                const data = await response.json();
                console.log("error: "+data.error);
                console.log("stu: "+data.stuData);
                console.log("res:4: "+data.error);
                if(data.error!=null){
                    $("#student-collection-data").empty();
                    $("#printable-div").hide();
                    showWarningMsg("error", data.error, "No Data");
                    return;
                } else{
                    if(data.stuData!=null){
                        let stulist = data.stuData;
                        $("#printable-div").show();
                        let tblData = `<table class="table table-striped table-bordered table-sm" id="studentTable">
                            <thead>
                            <tr>
                                <th>SNo</th>
                                <th>Grade</th>
                                <th>SR No</th>
                                <th>Student Name</th>
                                <th>Father Name</th>
                                <th>Discount Name</th>
                                <th>Description</th>`;

                        tblData+=`</tr></thead><tbody class="table-group-divider">`;
                        let counter = 1;
                        for (let i=0;i<stulist.length;i++) {
                            console.log("key======>>>>>>> "+stulist);
                            let studentData = stulist[i];
                            console.log("key====== "+i);
                            tblData += `<tr>
                                    <td>${counter}</td>
                                    <td>${studentData.grade}</td>
                                    <td>${studentData.srNo}</td><td>${studentData.studentName}</td><td>${studentData.fatherName}</td><td>${studentData.discount}</td><td>${studentData.description}</td>`;

                            tblData+=`</tr>`;
                            counter++;
                        }
                        tblData+=`</tbody></table>`;
                        //console.log("table last-"+tblData)
                        $("#student-collection-data").html(tblData);
                        const exportColumns = [0,1,2,3,4,5,6];
                        const columnDefs = [{ "orderable": false, "targets": [0] }];
                        $("#studentTable").DataTable({
                            scrollX: true,
                            autoWidth: false,
                            scrollCollapse: true,
                            paging: true,
                            sort: false,
                            fixedColumns: false,
                            layout: {
                                bottomEnd: {
                                    paging: {
                                        firstLast: false
                                    }
                                },
                                top1Start: {
                                    buttons: [
                                        {
                                            extend: 'excelHtml5',
                                            text: '<i class="bi bi-file-excel-fill text-success"></i>',
                                            titleAttr: 'Excel',
                                            title: 'Total Students Discount Data export',
                                            exportOptions: {
                                                columns: exportColumns
                                            }
                                        },
                                        {
                                            extend: 'csvHtml5',
                                            text: '<i class="bi bi-filetype-csv text-info"></i>',
                                            titleAttr: 'CSV',
                                            title: 'Total Students Discount Data export'
                                        },
                                        {
                                            extend: 'pdfHtml5',
                                            text: '<i class="bi bi-file-pdf-fill text-danger"></i>',
                                            titleAttr: 'PDF',
                                            /*orientation: 'landscape',
                                            scale: '40%',
                                            pageSize: 'A3',*/
                                            title: 'Total Students Discount Data export',
                                            /*customize: function (doc) {
                                                doc.defaultStyle.fontSize = 8; // smaller font helps fit more columns
                                            },*/
                                            exportOptions: {
                                                columns: exportColumns
                                            }
                                        },
                                        'colvis'
                                    ]
                                }
                            },
                            lengthMenu: [
                                [5, 10, 25, 50, 100, -1],
                                [5, 10, 25, 50, 100, 'All']
                            ],
                            pageLength: 25,
                            columnDefs: columnDefs
                        });
                        $(".buttons-excel, .buttons-csv, .buttons-pdf").each(function() {
                            // Remove the btn-secondary class from each button
                            $(this).removeClass("btn-secondary");
                        });
                        if(data.error!=null){
                            $("#student-collection-data").empty();
                            $("#printable-div").hide();
                            showWarningMsg('error', "Error: "+data.error, "Error");
                        }
                    } else{
                        $("#student-collection-data").empty();
                        $("#printable-div").hide();
                        showWarningMsg("error", "Data not found", "No Data");
                        return;
                    }
                }
            } catch(error) {
                $("#student-collection-data").empty();
                $("#printable-div").hide();
                showWarningMsg('error', "There was a problem with the fetch operation: " + error, "Error");
            }
        });



    </script>
</section>

</body>
</html>
