<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::section})}">
<head>
  <meta charset="UTF-8">
  <title>UAIC - Student</title>
</head>
<body>
<section>

  <div class="container-fluid px-3">
    <div class="col-md-12 ">
      <div class="card-header fs-3">My Collection</div>
      <hr/>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-12">
            <!--<form>-->
                <div class="row">
                  <div class="mb-3 col-md-4">
                    <label class="form-label">Select Date Option</label>
                    <div class="btn-group w-100" role="group">
                      <input type="radio" class="btn-check" name="dateOption" id="today" autocomplete="off" checked value="today">
                      <label class="btn btn-outline-success" for="today"><i class="bi bi-calendar2-event"></i> Today</label>

                      <input type="radio" class="btn-check" name="dateOption" id="range" autocomplete="off" value="range">
                      <label class="btn btn-outline-success" for="range"><i class="bi bi-calendar2-range"></i> Date Range</label>
                    </div>
                  </div>

                  <!-- Today Section -->
                  <div id="todaySection" class="date-section col-md-6">
                    <div class="mb-3">
                      <label class="form-label">Selected Date</label>
                      <input type="text" class="form-control" id="currentDate" name="currentDate" readonly>
                    </div>
                  </div>

                  <!-- Range Section -->
                  <div id="rangeSection" class="date-section d-none col-md-6">
                    <div class="row mb-3">
                      <div class="col">
                        <label class="form-label">Start Date</label>
                        <input type="text" class="form-control" id="startDate" name="startDate">
                      </div>
                      <div class="col">
                        <label class="form-label">End Date</label>
                        <input type="text" class="form-control" id="endDate" name="endDate">
                      </div>
                    </div>
                  </div>

                  <div class="col-md-2 align-self-end">
                    <div class="col-sm-12 mb-3">
                      <button type="button" class="btn btn-primary" onclick="validateAndSubmit();"><i class="bi bi-search"></i> Proceed</button>
                    </div>
                  </div>
                </div>
            <!--</form>-->
            <hr/>
        </div>
    </div>
  <!-- Loading overlay — shown while fetch is in progress -->
  <div id="loading-overlay" style="display:none; position:fixed; inset:0; background:rgba(255,255,255,0.80);
       backdrop-filter:blur(3px); z-index:9999; flex-direction:column;
       align-items:center; justify-content:center;">
    <div class="text-center">
      <div class="spinner-border text-primary" style="width:3.5rem;height:3.5rem;" role="status">
        <span class="visually-hidden">Loading…</span>
      </div>
      <div class="mt-3 fw-semibold text-primary fs-5">Calculating collection…</div>
      <div class="text-muted small mt-1">This may take a moment for large date ranges</div>
    </div>
  </div>

      <div class="row" id="print-div" style="display: none">
          <div class="col-md-3 mb-2">
              <button class="btn btn-success" id="printreceipt" onclick="printDiv('printable-div','Collection Summary')" data-div-id="printable-div"><i class="bi bi-printer-fill"></i> Print</button>
          </div>

      </div>
    <div class="col-md-12 " id="printable-div" style="display: none">

        <div class="card-header fs-3">Collection Summary</div><hr/>
            <div class="row">
                  <div class="col-md-12">
                      <div class="userwise-collection-info" id="userwise-collection-info">

                      </div>
                  </div>
           </div>
        <div class="card-header fs-3">Collection Data</div><hr/>
           <div id="collection-data-dates" style="display:flex; flex-wrap:nowrap; align-items:center; margin-bottom:0.5rem;">
                <div style="width:auto; margin-right:2rem; white-space:nowrap;"><strong>Start Date:</strong> <span id="collectionStartDateLabel"></span></div>
                <div style="width:auto; white-space:nowrap;"><strong>End Date:</strong> <span id="collectionEndDateLabel"></span></div>
           </div>
           <div class="row">
                <div class="fee-details" id="userwise-collection-data">

                </div>
           </div>
    </div>

  </div>

  <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
  <script th:src="@{/js/toastr.min.js}"></script>
  <link type="text/css" rel="stylesheet" th:href="@{/css/flatpickr.min.css}"/>
  <script th:src="@{/js/flatpickr.js}"></script>
    <script th:src="@{/js/chart.js}"></script>
  <script type="text/javascript" th:inline="javascript">
      let isAdmin = [[${isAdmin}]];
      const contextPath = /*[[@{/}]]*/ '/';
      const monthOrder = /*[[${monthOrder}]]*/ {};

      if (isAdmin) {
          flatpickr("#startDate", {
              dateFormat: "d/M/Y"
          });
      } else {
          flatpickr("#startDate", {
              dateFormat: "d/M/Y",
              minDate: new Date().fp_incr(-9)
          });
      }
      if(isAdmin){
          flatpickr("#endDate", {
              dateFormat: "d/M/Y",  // Equivalent to dd/MMM/yyyy
          });
      } else{
          flatpickr("#endDate", {
              dateFormat: "d/M/Y",  // Equivalent to dd/MMM/yyyy
              maxDate: "today",
          minDate: new Date().fp_incr(-9)
          });
      }

    flatpickr("#currentDate", {
      dateFormat: "d/M/Y",  // Equivalent to dd/MMM/yyyy
        minDate: "today",
        maxDate: "today"
    });
    const successMessage = [[${success}]];
    if (successMessage) {
      showMsg("success", successMessage, "Success");
    }

    const infoMessage = [[${info}]];
    if (infoMessage) {
      showMsg("info", infoMessage, "Info");
    }

    const errorMessage = [[${error}]];
    if (errorMessage) {
      showMsg("error", errorMessage, "Error");
    }

    function showMsg(msgType, msg, headerValue){
      toastr.options = {
        "closeButton": true,
        "debug": false,
        "newestOnTop": false,
        "progressBar": false,
        "positionClass": "toast-top-right",
        "preventDuplicates": false,
        "onclick": null,
        "showDuration": "600",
        "hideDuration": "1000",
        "timeOut": "5000",
        "extendedTimeOut": "1000",
        "showEasing": "swing",
        "hideEasing": "linear",
        "showMethod": "fadeIn",
        "hideMethod": "fadeOut"
      }
      toastr[msgType](msg,headerValue);
    }

    document.addEventListener('DOMContentLoaded', function() {
      // Set initial current date
      const date = new Date();
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
        'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

      const formattedDate =
              `${String(date.getDate()).padStart(2, '0')}/` +  // Day with leading zero
              `${months[date.getMonth()]}/` +                  // Month abbreviation
              `${date.getFullYear()}`;                         // Full year

      document.getElementById('currentDate').value = formattedDate;

      // Get radio buttons
      const todayRadio = document.getElementById('today');
      const rangeRadio = document.getElementById('range');

      // Get sections
      const todaySection = document.getElementById('todaySection');
      const rangeSection = document.getElementById('rangeSection');

      // Add event listeners
      todayRadio.addEventListener('change', toggleSections);
      rangeRadio.addEventListener('change', toggleSections);

      function toggleSections() {
        if (todayRadio.checked) {
          todaySection.classList.remove('d-none');
          rangeSection.classList.add('d-none');
          document.getElementById('currentDate').value = formattedDate;
        } else {
          todaySection.classList.add('d-none');
          rangeSection.classList.remove('d-none');
        }
      }
    });

    function escHtml(str) {
        if (str == null) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    const validateAndSubmit=()=>{
      const selectedOption = $('input[name="dateOption"]:checked').val();
      let url = "";
      let proceed = true;
      if(selectedOption.trim() === ''){
        showMsg("error","No option selected","Error")
        proceed = false;
        return;
      }
      let requestBody = {};
      let dateValToday = '';
      let startDate = '';
      let endDate = '';
      url = `${contextPath}getFeeCollectionDetailsOwn`;
      if(selectedOption==='today'){
        proceed  = true;
        dateValToday = $("#currentDate").val();
        if(dateValToday===''){
          showMsg("error","Today's date is missing","Error")
          proceed=false;
          return;
        }
        requestBody = {
          todayDate: dateValToday,
          selectedOption: selectedOption
        };
      } else if(selectedOption === 'range'){
          proceed = true;
          startDate = $("#startDate").val();
          endDate = $("#endDate").val();
          if(startDate==='' || endDate===''){
            proceed = false;
            showMsg("error","Start Date/End Date both are mandatory","Error");
            return;
          }
          requestBody = {
            startDate: startDate,
            endDate: endDate,
            selectedOption: selectedOption
          };
      }
      if(proceed){
        // Show spinner, disable button
        const overlay = document.getElementById('loading-overlay');
        const proceedBtn = document.querySelector('button[onclick="validateAndSubmit();"]');
        overlay.style.display = 'flex';
        if (proceedBtn) { proceedBtn.disabled = true; }

        fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(requestBody)
        })
            .then(response => {
                if (!response.ok) {
                  throw new Error('Network response was not ok');
                }
                return response.json();  // Parse response as JSON
            })
            .then(data => {
                // Hide spinner, re-enable button
                overlay.style.display = 'none';
                if (proceedBtn) { proceedBtn.disabled = false; }
                let rowData = data.finalData.userWiseFeeCollection;
                // If userWiseFeeCollection is a string, show a message
                if (typeof rowData === 'string') {
                    showMsg("error",`${rowData}`,"No Data");
                    overlay.style.display = 'none';
                    if (proceedBtn) { proceedBtn.disabled = false; }
                    return; // Stop further execution
                }
                $("#printable-div").show();
                $("#print-div").show();

                if(selectedOption === 'range'){
                    $('#collectionStartDateLabel').text(startDate);
                    $('#collectionEndDateLabel').text(endDate);
                } else {
                    $('#collectionStartDateLabel').text(dateValToday);
                    $('#collectionEndDateLabel').text(dateValToday);
                }

                let tableData = '<table class="table table-striped table-bordered table-sm"><thead><tr><th>SNo</th><th>User Name</th><th>Collection</th><th>Total Receipt(s)</th></tr></thead><tbody class="table-group-divider">';
                for(let i=0;i<rowData.length;i++){
                    let rowVal = rowData[i];
                    tableData+=`<tr><td>${(i+1)}</td><td>${rowVal[3]}</td><td class="text-center"><span class="badge rounded-pill text-bg-success"> &#8377; ${rowVal[0]}.00 </span></td><td>${rowVal[1]}</td></tr>`;
                }
                tableData+=`</tbody></table>`;
                $("#userwise-collection-info").html(tableData);

                //Setting fee data - userwise-collection-data
                let feeData;
                if(selectedOption === 'range'){
                    feeData = data.finalData.dateRangeFeeCollectionDetails;
                } else{
                    feeData = data.finalData.todayFeeCollectionDetails;
                }
                if (typeof feeData === 'string') {
                    $("#userwise-collection-data").html(`<div class="alert alert-danger"><strong>${feeData}</strong></div>`);
                } else {
                    let counter = 1;
                    let tblData = `<table class="table table-striped table-bordered table-sm">
                    <thead>
                        <tr>
                            <th>SNo</th>
                            <th>Grade</th>
                            <th>SR No</th>
                            <th>Student Name</th>
                            <th>Father Name</th>
                            <th>Months</th>
                            ${selectedOption === 'range' ? '<th>Submission Date</th>' : ''}
                            <th>Receipt No</th>
                            <th>Total Amount</th>
                            <th>Balance Amount</th>
                            <th>Paid Amount</th>
                            <th>Payment</th>
                            <th>User</th>

                        </tr>
                    </thead>
                    <tbody class="table-group-divider">`;
                    let totalAmountSubmitted = 0;
                    let totalAmount = 0;
                    let cashAmount = 0;
                    let onlineAmount = 0;
                    feeData.forEach(feeSubmission =>{
                        let srno = feeSubmission.academicStudent.classSrNo ? feeSubmission.academicStudent.classSrNo.trim() : '';
                        let dt = feeSubmission.feeSubmissionDate
                            ? new Date(feeSubmission.feeSubmissionDate).toISOString().split('T')[0] // Extracts "2025-01-22"
                            : '';

                        if (dt) {
                            let dateObj = new Date(dt);
                            dt = dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                            dt = dt.replaceAll(" ","/");
                        }
                        let feeSubmissionMonths = feeSubmission.feeSubmissionMonths;
                        let month_names = '';
                        if (feeSubmissionMonths && feeSubmissionMonths.length > 0) {
                            let monthArr = [];
                            feeSubmissionMonths.forEach(m => {
                                monthArr.push(m.monthMaster.monthName);
                            });
                            // Sort months in academic-year sequence (falls back to original order if a month is missing from the map)
                            monthArr.sort((a, b) => {
                                let pa = monthOrder[a];
                                let pb = monthOrder[b];
                                if (pa === undefined && pb === undefined) return 0;
                                if (pa === undefined) return 1;
                                if (pb === undefined) return -1;
                                return pa - pb;
                            });
                            month_names = monthArr.join(', ');
                        }
                        tblData += `<tr>
                                <td>${counter}</td>
                                <td>${escHtml(feeSubmission.academicStudent.grade.gradeName)} - ${escHtml(feeSubmission.academicStudent.section.sectionName)}</td>
                                <td>${escHtml(srno)}</td>
                                <td>${escHtml(feeSubmission.academicStudent.student.studentName)}</td>
                                <td>${escHtml(feeSubmission.academicStudent.student.fatherName)}</td>
                                <td style="white-space: normal; word-break: break-word; min-width: 90px; max-width: 160px;">${escHtml(month_names)}</td>
                                ${selectedOption === 'range' ? `<td>${escHtml(dt)}</td>` : ''}
                                <td>${escHtml(feeSubmission.receiptNo)}</td>
                                <td class="text-end">&#8377; ${feeSubmission.totalAmount}</td>
                                <td class="text-end">&#8377; ${feeSubmission.balanceAmount}</td>
                                <td class="text-end">&#8377; ${feeSubmission.paidAmount}</td>
                                <td>${escHtml(feeSubmission.paymentType) || '-'}</td>
                                <td>${escHtml(feeSubmission.createdByName)}</td>

                            </tr>`;
                        totalAmountSubmitted+=feeSubmission.paidAmount;
                        totalAmount+=feeSubmission.totalAmount;
                        if(feeSubmission.paymentType==='Online'){
                            onlineAmount+=feeSubmission.paidAmount;
                        } else {
                            cashAmount+=feeSubmission.paidAmount;
                        }
                        counter++;
                    });
                    const totalCols = selectedOption === 'range' ? 13 : 12;
                    const col1 = Math.floor(totalCols / 4);
                    const col2 = Math.floor(totalCols / 4);
                    const col3 = Math.floor(totalCols / 4);
                    // Remaining goes to last column
                    const col4 = totalCols - (col1 + col2 + col3);
                    tblData+=`</tbody>
                    <tfoot>
                        <tr>
                            <td colspan="${col1}" class="text-center">Total Amount: <strong>&#8377; ${totalAmount}</strong></td>
                            <td colspan="${col2}" class="text-center">Total Cash Amount: <strong>&#8377; ${cashAmount}</strong></td>
                            <td colspan="${col3}" class="text-center">Total Online Amount: <strong>&#8377; ${onlineAmount}</strong></td>
                            <td colspan="${col4}" class="text-center">Total Paid Amount: <strong>&#8377; ${totalAmountSubmitted}</strong></td>
                        </tr>
                    </tfoot>
                    </table>`;
                    $("#userwise-collection-data").html(`
                        <div style="overflow-x:auto; width:100%;">
                            ${tblData}
                        </div>
                    `);
                }
            })
            .catch(error => {
                // Hide spinner, re-enable button
                overlay.style.display = 'none';
                if (proceedBtn) { proceedBtn.disabled = false; }
                console.error('Error:', error);  // Handle error response
                const errorMsg = '';
                showMsg("error", errorMsg, "Error");
            });
      }
    }

    function printDiv(divId, title) {
        // Get the original container element
        const originalContent = document.getElementById(divId);

        // Clone the container so we don't modify the live DOM
        const contentClone = originalContent.cloneNode(true);

        // Get all canvas elements from the original container
        const originalCanvases = originalContent.querySelectorAll('canvas');

        // For each canvas in the original, get its data URL and update the cloned copy.
        originalCanvases.forEach(originalCanvas => {
            const canvasId = originalCanvas.id;
            // Convert the original canvas to a data URL
            const imgData = originalCanvas.toDataURL("image/png");

            // In the clone, find the canvas with the same id.
            const clonedCanvas = contentClone.querySelector(`#${canvasId}`);
            if (clonedCanvas) {
                // Create an image element and set its src to the canvas data URL
                const img = document.createElement('img');
                img.src = imgData;
                // Copy width and height from the original canvas (or cloned one if attributes are preserved)
                img.width = originalCanvas.width/2;
                img.height = originalCanvas.height/2;
                // Replace the cloned canvas with the image element
                clonedCanvas.parentNode.replaceChild(img, clonedCanvas);
            }
        });

        // Open a new window for printing
        const printWindow = window.open('', 'PRINT', 'height=850,width=900,top=100,left=150');
        if (!printWindow) {
            alert('Popup blocked! Please allow popups for this site.');
            return;
        }

        // Build the HTML for the print window, including Bootstrap CSS and Bootstrap Icons
        printWindow.document.write('<html><head><title>' + title + '</title>');
        printWindow.document.write(
            '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" ' +
            'integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">'
        );
        printWindow.document.write(
            '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">'
        );
        printWindow.document.write(
            '<style>' +
            '@page { size: A4 portrait; margin: 8mm; }' +
            'body { font-size: 9px; }' +
            '.card-header { font-size: 15px !important; }' +
            'table { table-layout: fixed; width: 100%; border-collapse: collapse; }' +
            'table td, table th { white-space: normal !important; word-break: break-word !important; overflow-wrap: break-word !important; font-size: 8px; padding: 2px 3px !important; line-height: 1.2; }' +
            '#userwise-collection-data table td:nth-child(6), #userwise-collection-data table th:nth-child(6) { width: 15%; }' +
            '</style>'
        );
        printWindow.document.write('</head><body>');

        // Write the cloned content (with images replacing canvases) into the new window
        printWindow.document.write(contentClone.innerHTML);
        printWindow.document.write('</body></html>');

        printWindow.document.close(); // necessary for IE >= 10
        printWindow.focus();          // necessary for IE >= 10

        // Wait for the content to load before printing
        setTimeout(function() {
            printWindow.print();
            printWindow.close();
        }, 1000);
    }
  </script>
</section>

</body>
</html>
