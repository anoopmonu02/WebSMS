<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Denied – Shiksha Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style th:inline="css">
        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
        }

        .page-bg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            background: url([[@{/images/back1.jpg}]]) no-repeat center center / cover;
        }

        .page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(12, 74, 110, 0.68);
            backdrop-filter: blur(7px);
            -webkit-backdrop-filter: blur(7px);
            z-index: 0;
        }

        .denied-card {
            display: flex;
            width: 900px;
            max-width: 100%;
            min-height: 480px;
            position: relative;
            z-index: 1;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
        }

        /* ── Left panel ── */
        .left-panel {
            width: 48%;
            background: linear-gradient(160deg, #0c4a6e 0%, #0369a1 55%, #0284c7 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            width: 320px; height: 320px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.08);
            top: -90px; left: -90px;
        }
        .left-panel::after {
            content: '';
            position: absolute;
            width: 220px; height: 220px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.06);
            bottom: -60px; right: -60px;
        }

        .left-brand {
            text-align: center;
            color: #fff;
            position: relative;
            z-index: 1;
        }

        .portal-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.4px;
            margin-bottom: 6px;
        }

        .portal-tagline {
            font-size: 13px;
            color: rgba(255,255,255,0.72);
            margin-bottom: 20px;
        }

        .powered-pill {
            display: inline-block;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            font-size: 11px;
            padding: 4px 14px;
            border-radius: 20px;
        }

        /* ── Right panel ── */
        .right-panel {
            width: 52%;
            background: #ffffff;
            padding: 48px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .icon-ring {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            background: #fff1f2;
            border: 3px solid #fecdd3;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            box-shadow: 0 4px 16px rgba(220,38,38,0.12);
        }

        .icon-ring i {
            font-size: 38px;
            color: #dc2626;
        }

        .denied-title {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .denied-msg {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 28px;
            max-width: 300px;
        }

        .btn-dashboard {
            background: linear-gradient(135deg, #0369a1, #0284c7);
            border: none;
            color: #fff;
            padding: 10px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: opacity .2s;
        }
        .btn-dashboard:hover { opacity: .88; color: #fff; }

        .btn-logout {
            background: transparent;
            border: 1.5px solid #dc2626;
            color: #dc2626;
            padding: 10px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: background .2s, color .2s;
        }
        .btn-logout:hover { background: #dc2626; color: #fff; }

        @media (max-width: 640px) {
            .denied-card { flex-direction: column; }
            .left-panel, .right-panel { width: 100%; }
            .left-panel { min-height: 180px; padding: 28px 20px; }
        }
    </style>
</head>
<body>
<div class="page-bg">
    <div class="denied-card">

        <!-- Left branding panel (same as login) -->
        <div class="left-panel">
            <div class="left-brand">
                <div class="illus-wrap mb-3">
                    <i class="bi bi-mortarboard-fill" style="font-size:64px;color:rgba(255,255,255,0.90);"></i>
                </div>
                <div class="portal-title">United Avadh – Shiksha</div>
                <div class="portal-tagline">School Management Portal</div>
                <span class="powered-pill">Powered by Code Gyan</span>
            </div>
        </div>

        <!-- Right content panel -->
        <div class="right-panel">
            <div class="icon-ring">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <div class="denied-title">Access Denied</div>
            <p class="denied-msg">
                You don't have permission to access this page.<br>
                If you think this is a mistake, please contact your school administrator.
            </p>
            <div class="d-flex gap-3 flex-wrap justify-content-center">
                <a th:href="@{/dashboard}" class="btn-dashboard">
                    <i class="bi bi-house-door me-1"></i> Go to Dashboard
                </a>
                <a th:href="@{/logout}" class="btn-logout">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </a>
            </div>
        </div>

    </div>
</div>
</body>
</html>
