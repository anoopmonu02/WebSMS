<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
</head>
<body>

<section class="container-fluid px-3">
    <div class="mt-2 mb-5">

        <div class="card-header fs-3">
            <i class="bi bi-key-fill me-2"></i>Change Password
        </div>
        <hr/>

        <!-- Success message -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Error message -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">

                        <form th:action="@{/auth/change-password}" method="post"
                              onsubmit="return validateChangePassword()">

                            <div class="mb-3">
                                <label for="currentPassword" class="form-label fw-semibold">
                                    Current Password <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="currentPassword"
                                           name="currentPassword" placeholder="Enter current password" required>
                                    <button class="btn btn-outline-secondary" type="button"
                                            onclick="toggleVisibility('currentPassword', this)" tabindex="-1">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="newPassword" class="form-label fw-semibold">
                                    New Password <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="newPassword"
                                           name="newPassword" placeholder="Minimum 6 characters" required
                                           oninput="checkStrength(this.value)">
                                    <button class="btn btn-outline-secondary" type="button"
                                            onclick="toggleVisibility('newPassword', this)" tabindex="-1">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <!-- Password strength bar -->
                                <div class="mt-1">
                                    <div class="progress" style="height:5px;">
                                        <div id="strengthBar" class="progress-bar" role="progressbar"
                                             style="width:0%"></div>
                                    </div>
                                    <small id="strengthLabel" class="text-muted"></small>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-semibold">
                                    Confirm New Password <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="confirmPassword"
                                           name="confirmPassword" placeholder="Re-enter new password" required>
                                    <button class="btn btn-outline-secondary" type="button"
                                            onclick="toggleVisibility('confirmPassword', this)" tabindex="-1">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div id="matchMsg" class="form-text"></div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-shield-lock me-1"></i>Update Password
                                </button>
                                <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Cancel</a>
                            </div>

                        </form>

                    </div>
                </div>
            </div>

            <!-- Tips panel -->
            <div class="col-md-4 mt-3 mt-md-0">
                <div class="card bg-light border-0">
                    <div class="card-body">
                        <h6 class="fw-bold mb-3"><i class="bi bi-info-circle me-1 text-primary"></i>Password Tips</h6>
                        <ul class="small text-muted ps-3">
                            <li>Use at least 6 characters</li>
                            <li>Mix uppercase, lowercase and numbers</li>
                            <li>Avoid using your name or date of birth</li>
                            <li>Do not reuse old passwords</li>
                            <li>Never share your password with anyone</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>

<th:block th:fragment="scripts">
<script th:inline="javascript">
    function toggleVisibility(fieldId, btn) {
        const field = document.getElementById(fieldId);
        const icon  = btn.querySelector('i');
        if (field.type === 'password') {
            field.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            field.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }

    function checkStrength(val) {
        const bar   = document.getElementById('strengthBar');
        const label = document.getElementById('strengthLabel');
        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = [
            { w: '20%', cls: 'bg-danger',  txt: 'Very Weak'  },
            { w: '40%', cls: 'bg-warning', txt: 'Weak'       },
            { w: '60%', cls: 'bg-info',    txt: 'Fair'       },
            { w: '80%', cls: 'bg-primary', txt: 'Strong'     },
            { w: '100%',cls: 'bg-success', txt: 'Very Strong'}
        ];
        const lvl = levels[Math.min(score - 1, 4)] || { w: '0%', cls: '', txt: '' };
        bar.style.width = lvl.w;
        bar.className   = 'progress-bar ' + lvl.cls;
        label.textContent = val.length > 0 ? lvl.txt : '';
    }

    document.getElementById('confirmPassword').addEventListener('input', function () {
        const np  = document.getElementById('newPassword').value;
        const msg = document.getElementById('matchMsg');
        if (this.value === '') { msg.textContent = ''; return; }
        if (this.value === np) {
            msg.innerHTML = '<span class="text-success"><i class="bi bi-check-circle"></i> Passwords match</span>';
        } else {
            msg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Passwords do not match</span>';
        }
    });

    function validateChangePassword() {
        const np  = document.getElementById('newPassword').value;
        const cp  = document.getElementById('confirmPassword').value;
        if (np.length < 6) {
            alert('New password must be at least 6 characters.');
            return false;
        }
        if (np !== cp) {
            alert('New password and confirm password do not match.');
            return false;
        }
        return true;
    }
</script>
</th:block>

</body>
</html>
