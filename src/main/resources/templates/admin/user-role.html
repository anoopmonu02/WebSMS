<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sms="http://www.smsweb.com/thymeleaf" th:replace="~{base::Layout(~{::section})}" th:inline="javascript">
<head>
  <meta charset="UTF-8">
  <title>Edit School</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<section>
    <div class="container">
        <div class="mt-2 gy-5 mb-5">
            <div class="card-header fs-3">Users Role List</div>
            <hr/>
            <table class="table table-bordered table-striped table-hover table-sm" th:if="${hasUserRoleMapping}">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Username</th>
                        <th>Name</th>
                        <th>Mobile</th>
                        <th>Roles</th>
                    </tr>
                </thead>
                <tbody class="table-group-divider">
                    <tr th:each="emp, iter : ${userRoleMap}">
                        <td th:text="${iter.index+1}"></td>
                        <td th:text="${emp.key.userEntity.username}"></td>
                        <td th:text="${emp.key.employeeName}"></td>
                        <td th:text="${emp.key.mobile1}"></td>
                        <td>
                            <span th:if="${emp.value == null}">No Roles</span>
                            <span th:each="role : ${emp.value}"
                                  class="badge me-1"
                                  th:classappend="${role.name == 'ROLE_SUPERADMIN' ? 'bg-danger' :
                                                  (role.name == 'ROLE_ADMIN'      ? 'bg-danger' :
                                                  (role.name == 'ROLE_STAFF'      ? 'bg-warning text-dark' :
                                                  (role.name == 'ROLE_TEACHER'    ? 'bg-success' :
                                                  (role.name == 'ROLE_ACCOUNTENT' ? 'bg-primary' : 'bg-secondary'))))}"
                                  th:text="${role.name == 'ROLE_SUPERADMIN' ? 'Super Admin' :
                                            (role.name == 'ROLE_ADMIN'      ? 'Super Admin' :
                                            (role.name == 'ROLE_STAFF'      ? 'Admin' :
                                            (role.name == 'ROLE_TEACHER'    ? 'Teacher' :
                                            (role.name == 'ROLE_ACCOUNTENT' ? 'Accountant' :
                                            (role.name == 'ROLE_STUDENT'    ? 'Student' :
                                             #strings.replace(role.name,'ROLE_',''))))))}">
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${!hasUserRoleMapping}">
                <p class="text-center">No User-Role found.</p>
            </div>
            <div class="pt-5">
                <a sms:access="ADMIN_USERROLE:CREATE" class="btn btn-success" th:href="@{/admin/add-user-to-role}"><i class="bi bi-node-plus-fill"></i> Assign Role to User</a>
            </div>
        </div>
    </div>
    <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script th:src="@{/js/toastr.min.js}"></script>
    <script type="text/javascript" th:inline="javascript">
        const successMessage = [[${success}]];
        if (successMessage) {
            showMsg("success", successMessage, "Success");
        }

        const infoMessage = [[${info}]];
        if (infoMessage) {
            showMsg("info", infoMessage, "Info");
        }

        const errorMessage = [[${error}]];
        if (errorMessage) {
            showMsg("error", errorMessage, "Error");
        }

        function showMsg(msgType, msg, headerValue){
            toastr.options = {
              "closeButton": true,
              "debug": false,
              "newestOnTop": false,
              "progressBar": false,
              "positionClass": "toast-top-right",
              "preventDuplicates": false,
              "onclick": null,
              "showDuration": "600",
              "hideDuration": "1000",
              "timeOut": "5000",
              "extendedTimeOut": "1000",
              "showEasing": "swing",
              "hideEasing": "linear",
              "showMethod": "fadeIn",
              "hideMethod": "fadeOut"
            }
            toastr[msgType](msg,headerValue);
        }
    </script>
</section>
</body>
</html>
