<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>ID Card Print</title>
</head>
<body>
<section>

    <div class="container-fluid px-3">

        <!-- ── Page header ── -->
        <div class="row">
            <div class="col-12">
                <div class="card-header fs-3">ID Card Print</div>
                <hr/>
            </div>
        </div>

        <!-- ── Filter form ── -->
        <div class="row">
            <div class="col-md-3">
                <label for="medium" class="form-label">Medium</label>
                <select id="medium" name="medium" class="form-select">
                    <option value="">Select Medium</option>
                    <option th:each="med : ${mediums}" th:value="${med.id}" th:text="${med.mediumName}">Medium</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="grade" class="form-label">Grade</label>
                <select id="grade" name="grade" class="form-select">
                    <option value="">Select Grade</option>
                    <option th:each="g : ${grades}" th:value="${g.id}" th:text="${g.gradeName}">Grade</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="section" class="form-label">Section</label>
                <select id="section" name="section" class="form-select">
                    <option value="">Select Section</option>
                    <option th:each="s : ${sections}" th:value="${s.id}" th:text="${s.sectionName}">Section</option>
                </select>
            </div>
            <div class="col-md-3 align-self-end">
                <button type="button" class="btn btn-primary" onclick="fetchAndRenderCards()">
                    <i class="bi bi-search"></i> Get ID Cards
                </button>
            </div>
        </div>

        <hr/>

        <!-- ── Action bar (hidden until cards load) ── -->
        <div id="action-bar" class="row mb-3" style="display:none;">
            <div class="col-12 d-flex align-items-center gap-3">
                <span id="card-count-badge" class="badge bg-primary fs-6"></span>
                <button type="button" class="btn btn-success" onclick="printDiv('id-card-container','ID Cards')">
                    <i class="bi bi-printer-fill"></i> Print All Cards
                </button>
            </div>
        </div>

        <!-- ── Spinner overlay (shown while fetching) ── -->
        <div id="id-card-spinner" style="display:none;" class="text-center py-5">
            <div class="d-flex flex-column align-items-center gap-3">
                <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="text-muted fs-5 mb-0">Generating ID cards, please wait…</p>
                <p class="text-muted small" id="spinner-sub">Fetching student data from server</p>
            </div>
        </div>

        <!-- ── Card grid (populated by JS) ── -->
        <div id="id-card-container" class="row g-3">
            <!-- cards injected here -->
        </div>

    </div><!-- /container-fluid -->

    <!-- ════════════════════════════════════════════════════
         Inline styles  (screen only — print CSS is injected
         into the popup window by printDiv)
    ═════════════════════════════════════════════════════ -->
    <style>
        /* ── Screen card ── */
        .id-card {
            width: 100%;
            min-height: 200px;
            border: 1.5px solid #888;
            border-radius: 6px;
            padding: 10px;
            box-sizing: border-box;
            background: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 12px;
            position: relative;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .id-card .card-school {
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: #0c4a6e;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 1.5px solid #0c4a6e;
            padding-bottom: 4px;
            margin-bottom: 4px;
        }

        .id-card .card-id-label {
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            background: #0c4a6e;
            padding: 2px 0;
            margin-bottom: 3px;
        }

        .id-card .card-session {
            text-align: center;
            font-size: 10px;
            color: #475569;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .id-card .card-body-row {
            display: flex;
            gap: 8px;
        }

        .id-card .card-fields {
            flex: 1;
        }

        .id-card .card-field {
            display: flex;
            margin-bottom: 3px;
            line-height: 1.3;
        }

        .id-card .field-label {
            font-weight: 600;
            color: #374151;
            min-width: 78px;
            font-size: 10px;
        }

        .id-card .field-value {
            color: #111827;
            font-size: 10px;
            word-break: break-word;
        }

        .id-card .card-photo {
            width: 72px;
            min-width: 72px;
            height: 86px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
        }

        .id-card .card-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .id-card .card-photo .no-photo {
            font-size: 9px;
            color: #94a3b8;
            text-align: center;
            padding: 4px;
        }

        .id-card .card-signature {
            border-top: 1px solid #cbd5e1;
            text-align: right;
            font-size: 9px;
            color: #64748b;
            padding-top: 4px;
            margin-top: 6px;
        }
    </style>

    <!-- ════════════════════════════════════════════════════
         Scripts
    ═════════════════════════════════════════════════════ -->
    <script th:src="@{/js/jquery-3.7.1.js}"></script>
    <script th:src="@{/js/toastr.min.js}"></script>
    <script type="text/javascript" th:inline="javascript">

        const contextPath  = /*[[@{/}]]*/ '/';
        const schoolName   = /*[[${school?.schoolName}]]*/ 'School Name';
        const sessionLabel = /*[[${academicYear?.sessionFormat}]]*/ 'Session';

        // ── Toast helper ──────────────────────────────────────────────────────
        function showMsg(type, msg, header) {
            toastr.options = {
                closeButton: true, progressBar: false,
                positionClass: 'toast-top-right',
                timeOut: '4000', showMethod: 'fadeIn', hideMethod: 'fadeOut'
            };
            toastr[type](msg, header);
        }

        // ── Fetch students and render cards ───────────────────────────────────
        function fetchAndRenderCards() {
            const medium  = $('#medium').val();
            const grade   = $('#grade').val();
            const section = $('#section').val();

            if (!medium || !grade || !section) {
                showMsg('error', 'Medium, Grade and Section are all mandatory', 'Warning');
                return;
            }

            // Show spinner, hide stale content
            $('#id-card-container').empty();
            $('#action-bar').hide();
            $('#id-card-spinner').show();
            $('#spinner-sub').text('Fetching student data from server…');

            // Animate the sub-message so the user knows something is happening
            const spinnerMsgs = [
                'Fetching student data from server…',
                'Loading student photos…',
                'Building ID cards…',
                'Almost ready…'
            ];
            let spinnerIdx = 0;
            const spinnerTimer = setInterval(() => {
                spinnerIdx = (spinnerIdx + 1) % spinnerMsgs.length;
                $('#spinner-sub').fadeOut(200, function() {
                    $(this).text(spinnerMsgs[spinnerIdx]).fadeIn(200);
                });
            }, 1200);

            const csrfToken  = $('meta[name="_csrf"]').attr('content')         || '';
            const csrfHeader = $('meta[name="_csrf_header"]').attr('content') || 'X-XSRF-TOKEN';

            fetch(contextPath + 'getStudentsForIdCard', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify({ medium, grade, section })
            })
            .then(res => {
                if (!res.ok) throw new Error('Server error: ' + res.status);
                return res.json();
            })
            .then(students => {
                clearInterval(spinnerTimer);
                $('#id-card-spinner').hide();
                if (!Array.isArray(students) || students.length === 0) {
                    showMsg('warning', 'No active students found for the selected class/section', 'No Data');
                    return;
                }
                renderCards(students);
            })
            .catch(err => {
                clearInterval(spinnerTimer);
                $('#id-card-spinner').hide();
                showMsg('error', 'Failed to load students. ' + err.message, 'Error');
            });
        }

        // ── Build card HTML ───────────────────────────────────────────────────
        function renderCards(students) {
            let html = '';

            students.forEach(as => {
                // Flat DTO — all fields at top level (no nested student/grade/section objects)
                const name       = as.studentName  || '';
                const father     = as.fatherName   || '';
                const mother     = as.motherName   || '';
                const srNo       = as.classSrNo    || '—';
                const classLabel = (as.gradeName || '') + (as.sectionName ? ' - ' + as.sectionName : '');

                let dob = '';
                if (as.dob) {
                    const d = new Date(as.dob);
                    dob = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).replaceAll(' ', '/');
                }

                const address = [as.address, as.landmark].filter(Boolean).join(', ');
                const phone   = as.mobile1 || '';

                // Photo — use context path so popup window resolves URL correctly
                let photoHtml = '<div class="no-photo">No Photo</div>';
                if (as.pic) {
                    const imgUrl = contextPath + 'images/students/' + as.pic;
                    photoHtml = `<img src="${imgUrl}" alt="Photo"
                                      onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                                 <div class="no-photo" style="display:none;">No Photo</div>`;
                }

                html += `
                <div class="col-md-6 col-lg-4">
                  <div class="id-card">
                    <div class="card-school">${escHtml(schoolName)}</div>
                    <div class="card-id-label">IDENTITY CARD</div>
                    <div class="card-session">Academic Year: ${escHtml(sessionLabel)}</div>
                    <div class="card-body-row">
                      <div class="card-fields">
                        <div class="card-field"><span class="field-label">Name</span><span class="field-value">: ${escHtml(name)}</span></div>
                        <div class="card-field"><span class="field-label">Father</span><span class="field-value">: ${escHtml(father)}</span></div>
                        <div class="card-field"><span class="field-label">Mother</span><span class="field-value">: ${escHtml(mother)}</span></div>
                        <div class="card-field"><span class="field-label">SR No.</span><span class="field-value">: ${escHtml(srNo)}</span></div>
                        <div class="card-field"><span class="field-label">Class</span><span class="field-value">: ${escHtml(classLabel)}</span></div>
                        <div class="card-field"><span class="field-label">Birth Date</span><span class="field-value">: ${escHtml(dob)}</span></div>
                        <div class="card-field"><span class="field-label">Address</span><span class="field-value">: ${escHtml(address)}</span></div>
                        <div class="card-field"><span class="field-label">Phone</span><span class="field-value">: ${escHtml(phone)}</span></div>
                      </div>
                      <div class="card-photo">${photoHtml}</div>
                    </div>
                    <div class="card-signature">Authorised Signature</div>
                  </div>
                </div>`;
            });

            $('#id-card-container').html(html);
            $('#card-count-badge').text(students.length + ' students');
            $('#action-bar').show();
        }

        // XSS-safe HTML escape
        function escHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ── Print in popup window (same pattern as fee-receipt / head-wise report) ──
        function printDiv(divId, title) {
            const el = document.getElementById(divId);
            if (!el || el.children.length === 0) {
                showMsg('warning', 'No cards to print', 'Warning');
                return;
            }

            const printWindow = window.open('', 'PRINT', 'height=900,width=1100,top=50,left=100');
            if (!printWindow) {
                alert('Popup blocked! Please allow popups for this site.');
                return;
            }

            printWindow.document.write('<html><head><title>' + title + '</title>');

            // Bootstrap for layout
            printWindow.document.write(
                '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" ' +
                'integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">'
            );

            // Card + page layout CSS
            // Use CSS Grid directly — do NOT rely on Bootstrap responsive breakpoints
            // because the popup "viewport" is treated as narrow and col-md-6 collapses to 100%.
            // Target: 8 cards per A4 = 2 columns × 4 rows
            // A4 usable height (10mm margins) = 277mm
            // 4 rows + 3 gaps (4mm each) = 265mm ÷ 4 = ~66mm per card
            printWindow.document.write(`<style>
                @page { size: A4 portrait; margin: 10mm; }

                * { box-sizing: border-box; }
                body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }

                /* 2-column CSS Grid — viewport-independent, always 2 cols */
                .row {
                    display: grid !important;
                    grid-template-columns: 1fr 1fr !important;
                    gap: 4mm !important;
                    margin: 0 !important;
                    padding: 0 !important;
                }
                [class*="col-"] {
                    width: 100% !important;
                    max-width: 100% !important;
                    padding: 0 !important;
                    flex: none !important;
                }

                /* Card: ~66mm tall to fit 4 rows on A4 */
                .id-card {
                    width: 100%;
                    border: 1px solid #555;
                    border-radius: 3px;
                    padding: 4px 6px;
                    page-break-inside: avoid;
                    break-inside: avoid;
                    font-size: 7.5pt;
                    line-height: 1.15;
                }
                .id-card .card-school   { text-align:center; font-size:9pt; font-weight:700;
                                           text-transform:uppercase; border-bottom:1px solid #000;
                                           padding-bottom:2px; margin-bottom:2px; }
                .id-card .card-id-label { text-align:center; font-size:7pt; font-weight:700;
                                           letter-spacing:1.5px; color:#fff; background:#0c4a6e;
                                           padding:1px 0; margin-bottom:2px;
                                           -webkit-print-color-adjust:exact; print-color-adjust:exact; }
                .id-card .card-session  { text-align:center; font-size:7pt; color:#333;
                                           margin-bottom:3px; font-weight:600; }
                .id-card .card-body-row { display:flex; gap:5px; }
                .id-card .card-fields   { flex:1; }
                .id-card .card-field    { display:flex; margin-bottom:1.5px; line-height:1.2; }
                .id-card .field-label   { font-weight:700; min-width:52px; font-size:7pt; color:#222; }
                .id-card .field-value   { font-size:7pt; color:#000; word-break:break-word; }
                .id-card .card-photo    { width:52px; min-width:52px; height:62px;
                                           border:1px solid #aaa; border-radius:2px;
                                           overflow:hidden; display:flex; align-items:center;
                                           justify-content:center; background:#f5f5f5; }
                .id-card .card-photo img{ width:100%; height:100%; object-fit:cover; }
                .id-card .no-photo      { font-size:6pt; color:#999; text-align:center; }
                .id-card .card-signature{ border-top:1px solid #ccc; text-align:right;
                                           font-size:6.5pt; color:#555; padding-top:2px; margin-top:3px; }
            </style>`);

            printWindow.document.write('</head><body>');
            // outerHTML includes the #id-card-container div (class="row g-3")
            // so our CSS grid-template-columns: 1fr 1fr actually matches .row
            // innerHTML would skip the outer wrapper and the grid CSS would never apply
            printWindow.document.write(el.outerHTML);
            printWindow.document.write('</body></html>');
            printWindow.document.close();
            printWindow.focus();

            setTimeout(() => {
                printWindow.print();
                printWindow.close();
            }, 1000);
        }

    </script>

</section>
</body>
</html>
